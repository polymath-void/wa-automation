name: Android Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ---- HARD PIN SDK (IMPORTANT FOR STABILITY) ----
      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0"

      # ---- GRADLE CACHE (SAFE MODE) ----
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2  # Force 8.2 instead of letting it pick the latest

        continue-on-error: true

      # ---- LICENSE HANDLING (CLEANER) ----
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      # ---- BUILD ----
      - name: Clean build
        run: ./gradlew clean --no-daemon

      - name: Assemble Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ---- VERIFY OUTPUT (CRITICAL DEBUG STEP) ----
      - name: Verify APK exists
        run: ls -R app/build/outputs || exit 1

      # ---- ARTIFACT UPLOAD ----
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
